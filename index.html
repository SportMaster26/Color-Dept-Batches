<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Dept - Batch Queue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Color Department - Batch Board</h1>
        <div class="header-actions">
            <button id="admin-toggle-btn" class="btn btn-admin">Admin Login</button>
            <button id="undo-btn" class="btn btn-undo admin-only hidden" title="Undo last status change">Undo</button>
            <button id="add-batch-btn" class="btn btn-primary admin-only hidden">+ New Batch</button>
            <button id="clear-completed-btn" class="btn btn-secondary admin-only hidden">Clear Completed</button>
        </div>
    </header>

    <!-- Tabs -->
    <div class="tab-bar">
        <button id="tab-active" class="tab-btn tab-selected">Active Batches</button>
        <button id="tab-completed" class="tab-btn">Completed <span id="completed-count" class="tab-badge hidden">0</span></button>
    </div>

    <!-- Modal for adding a new batch -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <h2>Add New Batch</h2>
            <form id="batch-form">
                <div class="form-group">
                    <label for="product-name">Product Name</label>
                    <input type="text" id="product-name" required placeholder="e.g. Safety Red 2041">
                </div>
                <div class="form-group">
                    <label for="bowl-select">Bowl</label>
                    <select id="bowl-select" required>
                        <option value="">-- Select Bowl --</option>
                        <optgroup label="575 Gallon">
                            <option value="A">Bowl A (575 gal)</option>
                            <option value="B">Bowl B (575 gal)</option>
                        </optgroup>
                        <optgroup label="230 Gallon">
                            <option value="E">Bowl E (230 gal)</option>
                            <option value="F">Bowl F (230 gal)</option>
                        </optgroup>
                        <optgroup label="1,120 Gallon">
                            <option value="C">Bowl C (1,120 gal)</option>
                            <option value="D">Bowl D (1,120 gal)</option>
                            <option value="G">Bowl G (1,120 gal)</option>
                            <option value="H">Bowl H (1,120 gal)</option>
                            <option value="I">Bowl I (1,120 gal)</option>
                        </optgroup>
                        <optgroup label="30 Gallon">
                            <option value="Stubby">Stubby (30 gal)</option>
                        </optgroup>
                        <optgroup label="2,920 Gallon">
                            <option value="The Hull">The Hull (2,920 gal)</option>
                            <option value="Thors Hammer">Thor's Hammer (2,920 gal)</option>
                        </optgroup>
                        <optgroup label="4,300 Gallon">
                            <option value="TTT">TTT (4,300 gal)</option>
                        </optgroup>
                        <optgroup label="Ribbon Mixer">
                            <option value="Ol Iron Sides">Ol' Iron Sides</option>
                        </optgroup>
                    </select>
                </div>
                <div class="form-group">
                    <label for="batch-packaging">Packaging</label>
                    <select id="batch-packaging">
                        <option value="">-- Select Packaging --</option>
                        <option value="Quart Bottles">Quart Bottles</option>
                        <option value="24 Oz. Jars">24 Oz. Jars</option>
                        <option value="1 Gallon Jugs">1 Gallon Jugs</option>
                        <option value="1 Gallon Pails">1 Gallon Pails</option>
                        <option value="4.5 Gallon Pails">4.5 Gallon Pails</option>
                        <option value="5 Gallon Pails">5 Gallon Pails</option>
                        <option value="30 Gallon Kegs">30 Gallon Kegs</option>
                        <option value="55 Gallon Drums">55 Gallon Drums</option>
                        <option value="275 Gallon Totes">275 Gallon Totes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="batch-unit-count">Approx. Unit Count</label>
                    <input type="number" id="batch-unit-count" placeholder="e.g. 500" min="0">
                </div>
                <div class="form-group">
                    <label for="batch-notes">Notes (optional)</label>
                    <input type="text" id="batch-notes" placeholder="e.g. Rush order for Customer X">
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add to Queue</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Mixing Complete (viscosity + initials) -->
    <div id="mixing-complete-overlay" class="modal-overlay hidden">
        <div class="modal">
            <h2>Mixing Complete</h2>
            <p id="mixing-complete-product" class="modal-subtitle"></p>
            <form id="mixing-complete-form">
                <div class="form-group">
                    <label for="viscosity-input">Viscosity (KU)</label>
                    <input type="text" id="viscosity-input" required placeholder="e.g. 85">
                </div>
                <div class="form-group">
                    <label for="initials-input">Initials</label>
                    <input type="text" id="initials-input" required placeholder="e.g. JD" maxlength="5">
                </div>
                <div class="form-actions">
                    <button type="button" id="mixing-complete-cancel" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Confirm</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Batch Complete (poured by) -->
    <div id="batch-complete-overlay" class="modal-overlay hidden">
        <div class="modal">
            <h2>Batch Complete</h2>
            <p id="batch-complete-product" class="modal-subtitle"></p>
            <form id="batch-complete-form">
                <div class="form-group">
                    <label for="poured-by-input">Poured By (Name)</label>
                    <input type="text" id="poured-by-input" required placeholder="e.g. John Doe">
                </div>
                <div class="form-actions">
                    <button type="button" id="batch-complete-cancel" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Confirm</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Board layout (active batches) -->
    <main id="board">
        <!-- Bowl lanes get rendered by JS -->
    </main>

    <!-- Completed batches board -->
    <div id="completed-board" class="completed-board hidden">
        <!-- Toolbar: view toggle + export -->
        <div class="completed-toolbar">
            <div class="view-toggle">
                <button id="view-table-btn" class="view-btn view-btn-active">Table</button>
                <button id="view-chart-btn" class="view-btn">Chart</button>
            </div>
            <button id="export-excel-btn" class="btn btn-primary btn-export">Export to Excel</button>
        </div>

        <!-- Table view -->
        <div id="completed-table-wrap" class="completed-table-wrap">
            <table id="completed-table" class="completed-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Product</th>
                        <th>Bowl</th>
                        <th>Bowl Capacity</th>
                        <th>Packaging</th>
                        <th>Unit Count</th>
                        <th>Viscosity</th>
                        <th>Initials</th>
                        <th>Poured By</th>
                        <th>Notes</th>
                        <th>Queued</th>
                        <th>Mixing Started</th>
                        <th>Mixing Complete</th>
                        <th>Pouring Started</th>
                        <th>Batch Complete</th>
                    </tr>
                </thead>
                <tbody id="completed-table-body"></tbody>
            </table>
        </div>

        <!-- Chart view -->
        <div id="completed-chart-wrap" class="completed-chart-wrap hidden">
            <canvas id="completed-chart"></canvas>
        </div>
    </div>

    <!-- Chart.js & SheetJS for completed tab -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
